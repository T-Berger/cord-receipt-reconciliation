name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Secret safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan publishable files
        run: python scripts/check_secrets.py

  python:
    name: Python 3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install locked dependencies
        run: uv sync --frozen --extra dev
      - name: Lint
        run: uv run ruff check src tests scripts/check_secrets.py
      - name: Test
        run: uv run pytest

  dashboard:
    name: Dashboard / Node 22
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Build and test
        run: npm test

  release:
    name: Tagged GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [secrets, python, dashboard]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Python package
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build --outdir release-assets/python
      - name: Package dashboard source
        run: |
          mkdir -p release-assets/dashboard
          tar \
            --exclude='./node_modules' \
            --exclude='./dist' \
            --exclude='./.vinext' \
            -czf release-assets/dashboard/receipt-review-dashboard.tar.gz \
            -C web-dashboard .
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: release-assets/
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release-assets/python/*
          release-assets/dashboard/*
          --generate-notes
          --title "$GITHUB_REF_NAME"
